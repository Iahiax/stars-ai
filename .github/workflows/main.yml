name: Init Project Structure

on:
  workflow_dispatch:

jobs:
  create-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create project structure
        run: |
          # ملفات الجذر
          touch train_all.py
          touch benchmark.py
          touch auto_improve.py
          touch generate_data.py
          touch compare_models.py
          touch rag_code.py
          touch finetune_arabic.py
          touch prune_model.py
          touch finetune_lora.py
          touch evaluate.py
          touch chat.py
          touch train_custom.py
          touch main.py
          touch requirements.txt
          touch README.md

          # مجلد stars_ai
          mkdir -p stars_ai/agents
          mkdir -p stars_ai/utils

          touch stars_ai/__init__.py
          touch stars_ai/key_manager.py
          touch stars_ai/model_registry.py
          touch stars_ai/model_builder.py
          touch stars_ai/gguf_converter.py

          touch stars_ai/agents/manager_agent.py
          touch stars_ai/agents/expert_agents.py

          touch stars_ai/utils/__init__.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Initialize project structure" || echo "No changes to commit"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
